version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    database:
      uri: "postgresql://postgres:postgres@localhost:5432/interfaces_web?sslmode=disable"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        output_db_file_name: "db.go"
